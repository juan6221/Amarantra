version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: amaranta-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: amaranta
    volumes:
      - mongodb_data:/data/db
      - ./backend/mongodb-init/init-db.js:/docker-entrypoint-initdb.d/01-init-db.js
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 2s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: amaranta-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/amaranta
      JWT_SECRET: ${JWT_SECRET:-misupersecretojwt}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

volumes:
  mongodb_data:
